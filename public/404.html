<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | ApnaFinds</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              green: "#0F5C4A",
              dark: "#0A3622",
              orange: "#F59E0B"
            }
          }
        }
      }
    };
  </script>
</head>
<body class="grid min-h-screen place-items-center bg-[#FAF7F2] px-4 text-center text-gray-800">
  <main class="max-w-xl">
    <span class="mx-auto grid h-24 w-24 place-items-center rounded-full bg-green-50 text-4xl text-brand-green">
      <i class="fa-solid fa-map-location-dot"></i>
    </span>

    <p class="mt-7 text-xs font-black uppercase tracking-[.22em] text-brand-orange">
      Error 404
    </p>

    <h1 class="mt-3 text-5xl font-black tracking-tight text-gray-900">
      Page Not Found
    </h1>

    <p class="mt-5 leading-8 text-gray-500">
      The page may have moved, been renamed or no longer be available.
    </p>

    <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
      <a href="index.html" class="rounded-xl bg-brand-green px-7 py-3.5 font-black text-white hover:bg-brand-dark">
        Go Home
      </a>

      <a href="products.html" class="rounded-xl border border-brand-green/20 bg-white px-7 py-3.5 font-black text-brand-green hover:bg-green-50">
        Shop Products
      </a>
    </div>
  </main>
</body>
</html>
