<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reset Password | ApnaFinds</title>

  <meta
    name="description"
    content="Reset the password for your ApnaFinds customer account."
  >


  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Plus Jakarta Sans", "sans-serif"]
          },
          colors: {
            brand: {
              green: "#0F5C4A",
              dark: "#0A3622",
              orange: "#F59E0B",
              cream: "#FAF7F2"
            }
          }
        }
      }
    };
  </script>


  <style>
    body {
      background:
        radial-gradient(circle at 0% 0%, rgba(15, 92, 74, .09), transparent 30%),
        radial-gradient(circle at 100% 5%, rgba(245, 158, 11, .10), transparent 28%),
        #FAF7F2;
    }

    .auth-gradient {
      background:
        radial-gradient(circle at 88% 10%, rgba(245, 158, 11, .25), transparent 27%),
        radial-gradient(circle at 10% 90%, rgba(255, 255, 255, .08), transparent 28%),
        linear-gradient(135deg, #0F5C4A 0%, #114D41 42%, #0A3622 100%);
    }

    .glass-card {
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, .95);
      box-shadow: 0 24px 70px -30px rgba(10, 54, 34, .34);
    }

    .password-strength-bar {
      height: 5px;
      border-radius: 999px;
      background: #E5E7EB;
      overflow: hidden;
    }

    .password-strength-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      transition: width .25s ease, background-color .25s ease;
    }

    .toast {
      transform: translate(-50%, 120%);
      opacity: 0;
      pointer-events: none;
      transition: .3s ease;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    ::-webkit-scrollbar {
      width: 7px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #0F5C4A;
      border-radius: 999px;
    }
  </style>

  <link rel="stylesheet" href="css/ai-helper.css">
</head>

<body class="min-h-screen font-sans text-gray-800 antialiased">

  <nav class="border-b border-white/70 bg-white/90 shadow-sm backdrop-blur-xl">
    <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6">

      <a href="index.html" class="flex items-center gap-2">
        <span class="grid h-10 w-10 place-items-center rounded-2xl bg-brand-green text-white shadow-lg shadow-brand-green/20">
          <i class="fa-solid fa-bag-shopping"></i>
        </span>

        <span class="text-xl font-black sm:text-2xl">
          <span class="text-brand-green">Apna</span><span class="text-brand-orange">Finds.</span>
        </span>
      </a>

      <a
        href="login.html"
        class="rounded-xl bg-green-50 px-4 py-2.5 text-sm font-black text-brand-green hover:bg-green-100"
      >
        Back to Login
      </a>

    </div>
  </nav>

  <main class="flex min-h-[calc(100vh-80px)] items-center justify-center px-4 py-12 sm:px-6">

    <section class="glass-card w-full max-w-xl rounded-[2rem] p-6 sm:p-9">

      <span class="grid h-14 w-14 place-items-center rounded-2xl bg-green-50 text-xl text-brand-green">
        <i class="fa-solid fa-key"></i>
      </span>

      <p class="mt-7 text-xs font-black uppercase tracking-[.2em] text-brand-orange">
        Account recovery
      </p>

      <h1 class="mt-3 text-4xl font-black tracking-tight text-gray-900">
        Reset Password
      </h1>

      <p class="mt-4 text-sm leading-7 text-gray-500">
        Because this is a local testing website, verify your account using the registered email and mobile number.
      </p>

      <form id="resetForm" class="mt-8 space-y-5">

        <div>
          <label for="email" class="mb-2 block text-sm font-bold text-gray-700">
            Registered email
          </label>

          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

            <input
              id="email"
              type="email"
              required
              autocomplete="email"
              class="w-full rounded-xl border border-gray-200 bg-white py-3.5 pl-11 pr-4 outline-none focus:border-brand-green focus:ring-2 focus:ring-brand-green/15"
            >
          </div>
        </div>

        <div>
          <label for="phone" class="mb-2 block text-sm font-bold text-gray-700">
            Registered mobile number
          </label>

          <div class="relative">
            <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

            <input
              id="phone"
              type="tel"
              required
              maxlength="10"
              inputmode="numeric"
              autocomplete="tel"
              class="w-full rounded-xl border border-gray-200 bg-white py-3.5 pl-11 pr-4 outline-none focus:border-brand-green focus:ring-2 focus:ring-brand-green/15"
            >
          </div>
        </div>

        <div>
          <label for="newPassword" class="mb-2 block text-sm font-bold text-gray-700">
            New password
          </label>

          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

            <input
              id="newPassword"
              type="password"
              required
              minlength="6"
              autocomplete="new-password"
              class="w-full rounded-xl border border-gray-200 bg-white py-3.5 pl-11 pr-12 outline-none focus:border-brand-green focus:ring-2 focus:ring-brand-green/15"
            >

            <button
              type="button"
              data-toggle-password="newPassword"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-brand-green"
            >
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div>
          <label for="confirmPassword" class="mb-2 block text-sm font-bold text-gray-700">
            Confirm new password
          </label>

          <div class="relative">
            <i class="fa-solid fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

            <input
              id="confirmPassword"
              type="password"
              required
              minlength="6"
              autocomplete="new-password"
              class="w-full rounded-xl border border-gray-200 bg-white py-3.5 pl-11 pr-12 outline-none focus:border-brand-green focus:ring-2 focus:ring-brand-green/15"
            >

            <button
              type="button"
              data-toggle-password="confirmPassword"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-brand-green"
            >
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <p id="formMessage" class="hidden rounded-xl p-3 text-sm font-bold"></p>

        <button
          id="submitButton"
          type="submit"
          class="flex w-full items-center justify-center gap-3 rounded-xl bg-brand-green py-4 text-lg font-black text-white shadow-lg shadow-brand-green/20 hover:bg-brand-dark disabled:cursor-not-allowed disabled:opacity-60"
        >
          <i class="fa-solid fa-key"></i>
          Reset Password
        </button>

      </form>

      <p class="mt-7 text-center text-sm font-semibold text-gray-500">
        Remembered your password?
        <a href="login.html" class="font-black text-brand-green hover:text-brand-dark">
          Sign in
        </a>
      </p>

    </section>

  </main>

  <script src="js/auth.js"></script>

  <script>
    const auth = window.ApnaFindsAuth;

    const elements = {
      resetForm: document.getElementById("resetForm"),
      email: document.getElementById("email"),
      phone: document.getElementById("phone"),
      newPassword: document.getElementById("newPassword"),
      confirmPassword: document.getElementById("confirmPassword"),
      formMessage: document.getElementById("formMessage"),
      submitButton: document.getElementById("submitButton")
    };

    function showMessage(message, type = "error") {
      elements.formMessage.textContent = message;
      elements.formMessage.className =
        type === "success"
          ? "rounded-xl bg-green-50 p-3 text-sm font-bold text-brand-green"
          : "rounded-xl bg-red-50 p-3 text-sm font-bold text-red-600";
    }

    function setSubmitting(enabled) {
      elements.submitButton.disabled = enabled;

      elements.submitButton.innerHTML = enabled
        ? '<i class="fa-solid fa-spinner fa-spin"></i> Resetting'
        : '<i class="fa-solid fa-key"></i> Reset Password';
    }

    elements.phone.addEventListener("input", () => {
      elements.phone.value = auth.normalizePhone(elements.phone.value);
    });

    document.querySelectorAll("[data-toggle-password]").forEach(button => {
      button.addEventListener("click", () => {
        const input = document.getElementById(
          button.dataset.togglePassword
        );

        const showing = input.type === "text";
        input.type = showing ? "password" : "text";

        button.innerHTML = showing
          ? '<i class="fa-solid fa-eye"></i>'
          : '<i class="fa-solid fa-eye-slash"></i>';
      });
    });

    elements.resetForm.addEventListener("submit", event => {
      event.preventDefault();

      if (elements.newPassword.value !== elements.confirmPassword.value) {
        showMessage("The new passwords do not match.");
        return;
      }

      setSubmitting(true);

      const result = auth.resetCustomerPassword(
        elements.email.value,
        elements.phone.value,
        elements.newPassword.value
      );

      if (!result.ok) {
        setSubmitting(false);
        showMessage(result.message);
        return;
      }

      showMessage(
        "Password updated. Redirecting to login...",
        "success"
      );

      setTimeout(() => {
        window.location.href = "login.html";
      }, 900);
    });
  </script>
  <script src="js/backend-client.js"></script>
  <script src="js/ai-helper.js"></script>
</body>
</html>
